Every poem, over time, decays. Whether we lose access to its original
printing or text (or parts of it), or the words in the poem change 
meaning or pronunction, its references are no longer in the cultural 
imagination, or it must be literally translated into a modern language, 
or optical character recognition distorts and derails it, there is some 
way in which a poem, once written, will never be the same to its future 
readers.

"Death Be Not Proud", also known as "Holy Sonnet X", is a sonnet by
English poet John Donne, published in 1633, almost 400 years ago. So
much about my experience of this sonnet marks me as being in my own
time. It is difficult to imagine how it read to those in the 1600s.
While it may be well-preserved in some ways, it is impossible to 
preserve its context. Even its rhythm and meter is foreign to modern
sonnets, like America sonnets by Terrance Hayes or Diane Suess. It
is decaying, and in decay, changing.

<script>
const rules = {
        "a": ["o"],
        "b": ["l","h", "d", "o", "c"],
        "c": ["i"],
        "d": ["o", "c", "b"],
        "e": ["c"],
        "f": ["i", "l"],
        "g": ["o", "y"],
        "h": ["n", "l", "r"],
        "i": ["."],
        "j": ["i"],
        "k": ["l", "r"],
        "l": ["i"],
        "m": ["n"],
        "n": ["i", "r"],
        "o": ["c"],
        "p": ["o", "q"],
        "q": ["o", "p"],
        "r": ["i"],
        "s": ["."],
        "t": ["l"],
        "u": ["."],
        "v": ["."],
        "w": ["v"],
        "x": ["."],
        "y": ["u", "g"],
        "z": ["."],
        ",": ["."],
        ";": [","],
        "'": ["."],
        "?": ["."],
        ".": [],
        " ": []
      }

      const start = `death, be not proud, though some have called thee _
mighty and dreadful, for thou art not so; _
for those whom thou think'st thou dost overthrow _
die not, poor death, nor yet canst thou kill me. _
from rest and sleep, which but thy pictures be, _ 
much pleasure; then from thee much more must flow, _
and soonest our best men with thee do go, _
rest of their bones, and soul's delivery. _
thou art slave to fate, chance, kings, and desperate men, _
and dost with poison, war, and sickness dwell, _
and poppy or charms can make us sleep as well _
and better than thy stroke; why swell'st thou then? _
one short sleep past, we wake eternally _
and death shall be no more; death, thou shalt die.`

window.onload=()=>{
  // Grab container & prep
  const div=document.getElementById("main"),
        chars=start.split(''),        // characters
        excl=[63,215,414,477,639];   // excluded indexes
  let speed=3000, // speed
      dataIndex=0;    // dataIndex

  // Build DOM
  for(let i=0;i<chars.length;i++){
    let c=chars[i];
    if(c==="_"){
      div.appendChild(document.createElement("br"));
    } else {
      let e=document.createElement("span");
      e.textContent=c;
      div.appendChild(e);
      // if not a space, possibly assign data-index, and set width
      if(c!==" "){
        if(!excl.includes(i)) e.dataset.index=dataIndex++;
        e.style.display="inline-block";
        e.style.width=e.getBoundingClientRect().width+"px";
      }
    }
  }

  // Replace one character randomly
  function changeChar(){
    let r=Math.floor(Math.random()*dataIndex),
        e=div.querySelector('span[data-index="'+r+'"]'),
        oldChar=e.textContent,
        R=rules[oldChar];
    if(R && R.length){
      let n=R[Math.floor(Math.random()*R.length)];
      e.classList.add("highlight");
      e.textContent=n;
      setTimeout(()=>e.classList.remove("highlight"),2000);
    }
    scheduleNext();
  }

  // Schedule next replacement
  function scheduleNext(){
    let t=1+Math.floor(Math.random()*speed);
    speed=Math.max(3,speed*0.95);
    setTimeout(changeChar,t);
  }

  scheduleNext(); // start
};

</script>
